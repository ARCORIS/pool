"name": "Release"

"on":
  push:
    branches:
      - "main"
      - "next"
  workflow_dispatch:

concurrency:
  # Only one release pipeline should run per branch at a time.
  #
  # This avoids overlapping semantic-release executions on the same release
  # branch, which can otherwise race on tags, changelog commits, or GitHub
  # release publication.
  group: "release-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  verify:
    name: "verify"
    runs-on: "ubuntu-latest"

    permissions:
      contents: "read"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          # semantic-release itself needs full history later, but keeping fetch
          # depth explicit here avoids accidental dependence on a shallow clone.
          fetch-depth: 0

      - name: "Setup Go"
        uses: "actions/setup-go@v6"
        with:
          # Respect the Go version declared by the repository.
          go-version-file: "go.mod"
          cache: true

      - name: "Display Go version"
        run: go version

      - name: "Run unit tests"
        run: go test ./...

      - name: "Run race detector"
        run: go test -race ./...

      - name: "Run go vet"
        run: go vet ./...

  release:
    name: "release"
    runs-on: "ubuntu-latest"
    needs:
      - "verify"

    # Releasing happens only after the verification job passes on a push to a
    # configured release branch (`main` or `next`).
    #
    # This does NOT replace branch protection:
    # - protect `main` and `next`
    # - require pull requests before merge
    # - require approving reviews
    # - require status checks
    #
    # semantic-release can only be made "PR-gated" through repository rules,
    # not through release.config.cjs alone.
    permissions:
      # Needed by @semantic-release/github to publish releases.
      contents: "write"
      # Needed only if the GitHub plugin adds labels or comments to issues.
      issues: "write"
      # Needed only if the GitHub plugin adds labels or comments to pull requests.
      pull-requests: "write"

    # Optional but strongly recommended:
    # create a GitHub Environment named `release` and require reviewers there.
    #
    # If the environment is configured with required reviewers, this job will
    # pause for explicit approval before using secrets and publishing a release.
    environment:
      name: "release"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
        with:
          # semantic-release requires the full git history and tags to calculate
          # the next version correctly.
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: "actions/setup-node@v6"
        with:
          # This repository intentionally does not carry `package.json` or
          # `package-lock.json`.
          #
          # Release tooling is installed ephemerally at workflow runtime instead
          # of being modeled as a committed Node project inside this Go library.
          # Disable package-manager cache discovery so `setup-node` does not look
          # for absent npm manifests.
          node-version: "24"
          package-manager-cache: false

      - name: "Show Node and npm versions"
        run: |
          node --version
          npm --version

      - name: "Install standalone semantic-release toolchain"
        run: |
          # Keep the workflow honest about repository policy:
          # - no `package.json`
          # - no `package-lock.json`
          # - no half-lockfile / half-fallback logic
          #
          # `--package-lock=false` prevents npm from fabricating a lockfile in the
          # checked-out tree during CI.
          npm install --no-save --package-lock=false --no-audit --fund=false \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator \
            conventional-changelog-conventionalcommits

      - name: "Verify release configuration exists"
        run: test -f release.config.cjs

      - name: "Run semantic-release"
        env:
          # Default path:
          # - GITHUB_TOKEN is enough to publish GitHub releases.
          #
          # Important limitation:
          # - if your branch protection forbids bot pushes, the @semantic-release/git
          #   plugin may fail when committing CHANGELOG.md back to the release
          #   branch using the default token.
          #
          # If you intentionally allow protected-branch release commits through a
          # dedicated GitHub App or PAT, store that token as
          # `SEMANTIC_RELEASE_TOKEN` and it will take precedence.
          #
          # If you do NOT want automation to push back to a protected branch,
          # remove `@semantic-release/git` / changelog commit-back behavior from
          # the semantic-release configuration instead of weakening branch rules
          # casually.
          #
          # This workflow intentionally installs semantic-release tooling
          # ephemerally and does not rely on a committed Node manifest.
          DEFAULT_GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          SEMANTIC_RELEASE_TOKEN: "${{ secrets.SEMANTIC_RELEASE_TOKEN }}"
        run: |
          if [ -n "${SEMANTIC_RELEASE_TOKEN}" ]; then
            export GH_TOKEN="${SEMANTIC_RELEASE_TOKEN}"
          else
            export GH_TOKEN="${DEFAULT_GH_TOKEN}"
          fi

          npx semantic-release
